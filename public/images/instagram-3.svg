<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="400" height="120" fill="url(#sky3)"/>
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="120">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  
  <!-- Distant mountains -->
  <path d="M0 120 L80 60 L160 100 L240 40 L320 90 L400 50 L400 120 Z" fill="#708090" opacity="0.6"/>
  <path d="M0 120 L60 80 L140 110 L220 70 L300 100 L380 75 L400 95 L400 120 Z" fill="#778899" opacity="0.7"/>
  
  <!-- Main mountain -->
  <path d="M150 120 L250 30 L350 120 Z" fill="#5F6A6A"/>
  <path d="M250 30 L280 60 L250 50 L220 60 Z" fill="#D3D3D3" opacity="0.5"/>
  
  <!-- Rice field -->
  <rect y="120" width="400" height="180" fill="#228B22"/>
  
  <!-- Field sections -->
  <g fill="#1E7D1E">
    <rect x="0" y="130" width="400" height="15"/>
    <rect x="0" y="160" width="400" height="12"/>
    <rect x="0" y="190" width="400" height="10"/>
    <rect x="0" y="220" width="400" height="8"/>
    <rect x="0" y="250" width="400" height="8"/>
    <rect x="0" y="280" width="400" height="8"/>
  </g>
  
  <!-- Lighter green stripes -->
  <g fill="#32CD32" opacity="0.5">
    <rect x="0" y="145" width="400" height="8"/>
    <rect x="0" y="175" width="400" height="8"/>
    <rect x="0" y="205" width="400" height="6"/>
    <rect x="0" y="235" width="400" height="6"/>
    <rect x="0" y="265" width="400" height="5"/>
  </g>
  
  <!-- Water channel - perspective -->
  <path d="M195 120 L180 300 L220 300 L205 120 Z" fill="#4682B4" opacity="0.8"/>
  
  <!-- Water reflections -->
  <g fill="white" opacity="0.4">
    <ellipse cx="200" cy="160" rx="4" ry="10"/>
    <ellipse cx="198" cy="200" rx="3" ry="12"/>
    <ellipse cx="202" cy="250" rx="5" ry="15"/>
  </g>
  
  <!-- Mountain reflection in water -->
  <path d="M190 160 L200 140 L210 160 Z" fill="#5F6A6A" opacity="0.2"/>
  
  <!-- Rice plants along edges -->
  <g stroke="#006400" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M30 300 Q35 260 30 220"/>
    <path d="M60 300 Q65 270 60 240"/>
    <path d="M90 300 Q95 265 90 230"/>
    
    <path d="M310 300 Q315 265 310 230"/>
    <path d="M340 300 Q345 270 340 240"/>
    <path d="M370 300 Q375 260 370 220"/>
  </g>
  
  <!-- Atmospheric haze -->
  <rect y="120" width="400" height="40" fill="url(#haze)" opacity="0.3"/>
  <defs>
    <linearGradient id="haze" x1="0" y1="120" x2="0" y2="160">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
