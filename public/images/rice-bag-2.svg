<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="150" cy="385" rx="80" ry="15" fill="#000" opacity="0.1"/>
  
  <!-- Rice bag body -->
  <path d="M65 85 L65 350 Q65 368 82 368 L218 368 Q235 368 235 350 L235 85 Q235 65 218 58 L82 58 Q65 65 65 85 Z" fill="url(#bag-gradient-2)"/>
  
  <defs>
    <linearGradient id="bag-gradient-2" x1="65" y1="0" x2="235" y2="400">
      <stop offset="0%" stop-color="#FAF8F0"/>
      <stop offset="25%" stop-color="#F5F0E0"/>
      <stop offset="50%" stop-color="#EDE8D8"/>
      <stop offset="75%" stop-color="#E5E0D0"/>
      <stop offset="100%" stop-color="#D8D3C3"/>
    </linearGradient>
  </defs>
  
  <!-- Bag texture lines -->
  <g stroke="#D0CBBB" stroke-width="0.5" opacity="0.4">
    <line x1="85" y1="62" x2="85" y2="365"/>
    <line x1="105" y1="60" x2="105" y2="366"/>
    <line x1="125" y1="59" x2="125" y2="367"/>
    <line x1="145" y1="58" x2="145" y2="368"/>
    <line x1="165" y1="58" x2="165" y2="368"/>
    <line x1="185" y1="59" x2="185" y2="367"/>
    <line x1="205" y1="60" x2="205" y2="366"/>
    <line x1="225" y1="62" x2="225" y2="365"/>
  </g>
  
  <!-- Bag top fold -->
  <path d="M60 58 Q85 42 150 38 Q215 42 240 58 L235 85 Q215 68 150 63 Q85 68 65 85 Z" fill="#E5E0D0"/>
  <path d="M60 58 Q85 42 150 38 Q215 42 240 58" stroke="#C8C3B3" stroke-width="1" fill="none"/>
  
  <!-- Twisted top -->
  <path d="M125 38 Q135 18 150 12 Q165 18 175 38" fill="#D8D3C3"/>
  <path d="M128 32 Q142 22 150 20 Q158 22 172 32" stroke="#B5B0A0" stroke-width="1" fill="none"/>
  
  <!-- Tie/ribbon -->
  <rect x="142" y="26" width="16" height="7" rx="2" fill="#F5F0E0"/>
  <line x1="146" y1="29.5" x2="154" y2="29.5" stroke="#C8A852" stroke-width="1"/>
  
  <!-- Rice grains visible through bag -->
  <g fill="#FFF8E8" opacity="0.4">
    <ellipse cx="100" cy="150" rx="8" ry="12" transform="rotate(-15 100 150)"/>
    <ellipse cx="130" cy="180" rx="7" ry="11" transform="rotate(10 130 180)"/>
    <ellipse cx="170" cy="160" rx="8" ry="12" transform="rotate(-5 170 160)"/>
    <ellipse cx="200" cy="190" rx="7" ry="11" transform="rotate(20 200 190)"/>
    <ellipse cx="115" cy="240" rx="8" ry="12" transform="rotate(-10 115 240)"/>
    <ellipse cx="155" cy="220" rx="7" ry="11" transform="rotate(5 155 220)"/>
    <ellipse cx="185" cy="260" rx="8" ry="12" transform="rotate(-8 185 260)"/>
    <ellipse cx="140" cy="300" rx="7" ry="11" transform="rotate(12 140 300)"/>
    <ellipse cx="175" cy="320" rx="8" ry="12" transform="rotate(-15 175 320)"/>
  </g>
  
  <!-- Side creases -->
  <path d="M65 120 Q62 220 65 320" stroke="#C8C3B3" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M235 120 Q238 220 235 320" stroke="#C8C3B3" stroke-width="0.8" fill="none" opacity="0.4"/>
  
  <!-- Bottom fold -->
  <path d="M65 350 Q85 358 150 362 Q215 358 235 350" stroke="#B5B0A0" stroke-width="1" fill="none"/>
