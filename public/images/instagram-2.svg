<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky with clouds -->
  <rect width="400" height="150" fill="url(#sky2)"/>
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="150">
      <stop offset="0%" stop-color="#5BA3C6"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
  </defs>
  
  <!-- Clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="80" cy="40" rx="40" ry="20"/>
    <ellipse cx="100" cy="35" rx="30" ry="18"/>
    <ellipse cx="60" cy="45" rx="25" ry="15"/>
    
    <ellipse cx="300" cy="60" rx="50" ry="25"/>
    <ellipse cx="330" cy="55" rx="35" ry="20"/>
    <ellipse cx="270" cy="65" rx="30" ry="18"/>
  </g>
  
  <!-- Background hills -->
  <path d="M0 180 Q100 140 200 160 Q300 180 400 150 L400 200 L0 200 Z" fill="#6B8E23" opacity="0.5"/>
  
  <!-- Golden rice field -->
  <rect y="150" width="400" height="150" fill="#DAA520"/>
  
  <!-- Rice stalks - golden/ready for harvest -->
  <g stroke="#B8860B" stroke-width="1" fill="none">
    <!-- Left side stalks -->
    <path d="M20 300 Q25 250 20 200 Q30 180 25 150"/>
    <path d="M40 300 Q45 260 40 220 Q50 200 45 170"/>
    <path d="M60 300 Q65 255 60 210 Q70 190 65 160"/>
    <path d="M80 300 Q85 250 80 200 Q90 180 85 150"/>
    <path d="M100 300 Q105 260 100 220 Q110 200 105 170"/>
    
    <!-- Center stalks -->
    <path d="M180 300 Q185 240 180 180 Q190 160 185 130"/>
    <path d="M200 300 Q205 245 200 190 Q210 170 205 140"/>
    <path d="M220 300 Q225 240 220 180 Q230 160 225 130"/>
    
    <!-- Right side stalks -->
    <path d="M300 300 Q305 250 300 200 Q310 180 305 150"/>
    <path d="M320 300 Q325 260 320 220 Q330 200 325 170"/>
    <path d="M340 300 Q345 255 340 210 Q350 190 345 160"/>
    <path d="M360 300 Q365 250 360 200 Q370 180 365 150"/>
    <path d="M380 300 Q385 260 380 220 Q390 200 385 170"/>
  </g>
  
  <!-- Rice grain heads -->
  <g fill="#F4D03F">
    <ellipse cx="25" cy="145" rx="8" ry="15" transform="rotate(-10 25 145)"/>
    <ellipse cx="45" cy="165" rx="7" ry="14" transform="rotate(5 45 165)"/>
    <ellipse cx="65" cy="155" rx="8" ry="15" transform="rotate(-5 65 155)"/>
    <ellipse cx="85" cy="145" rx="7" ry="14" transform="rotate(10 85 145)"/>
    <ellipse cx="105" cy="165" rx="8" ry="15" transform="rotate(-8 105 165)"/>
    
    <ellipse cx="185" cy="125" rx="8" ry="16" transform="rotate(-5 185 125)"/>
    <ellipse cx="205" cy="135" rx="9" ry="17" transform="rotate(3 205 135)"/>
    <ellipse cx="225" cy="125" rx="8" ry="16" transform="rotate(-3 225 125)"/>
    
    <ellipse cx="305" cy="145" rx="8" ry="15" transform="rotate(8 305 145)"/>
    <ellipse cx="325" cy="165" rx="7" ry="14" transform="rotate(-5 325 165)"/>
    <ellipse cx="345" cy="155" rx="8" ry="15" transform="rotate(5 345 155)"/>
    <ellipse cx="365" cy="145" rx="7" ry="14" transform="rotate(-10 365 145)"/>
    <ellipse cx="385" cy="165" rx="8" ry="15" transform="rotate(8 385 165)"/>
  </g>
  
  <!-- Sunlight effect -->
  <rect width="400" height="300" fill="url(#sunlight)" opacity="0.2"/>
  <defs>
    <radialGradient id="sunlight" cx="80%" cy="20%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
